<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIAMAR — 9 de Maio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700;1,800;1,900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:  #07111f;
      --aqua:  #06b6d4;
      --gold:  #f59e0b;
      --white: #ffffff;
    }

    html, body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background: var(--navy);
    }

    .poster {
      width: 1080px;
      height: 1080px;
      position: relative;
      background: var(--navy);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* ─── BACKGROUND IMAGE ─── */
    .bg {
      position: absolute;
      inset: 0;
      background-image: url('img/freepik__enhance-the-cinematic-feel-on-this-photo__34302.jpg');
      background-size: cover;
      background-position: center 30%;
      opacity: 0.38;
    }

    /* ─── GRADIENT OVERLAYS ─── */
    .overlay-bottom {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(7,17,31,1) 0%,
        rgba(7,17,31,0.82) 35%,
        rgba(7,17,31,0.2) 65%,
        rgba(7,17,31,0.05) 100%
      );
    }

    .overlay-left {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        rgba(7,17,31,0.7) 0%,
        rgba(7,17,31,0) 60%
      );
    }

    /* ─── GRAIN TEXTURE ─── */
    .grain {
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
    }

    /* ─── AQUA GLOW ─── */
    .glow {
      position: absolute;
      top: -200px;
      right: -200px;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(6,182,212,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ─── CONTENT ─── */
    .content {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 72px 80px;
    }

    /* ─── TOP BAR ─── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-img {
      height: 44px;
      width: auto;
      filter: brightness(0) invert(1);
      opacity: 0.95;
    }

    .season-tag {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--aqua);
      background: rgba(6,182,212,0.1);
      border: 1px solid rgba(6,182,212,0.25);
      padding: 7px 16px;
      border-radius: 100px;
    }

    /* ─── MIDDLE DECORATIVE LINE ─── */
    .mid-accent {
      display: flex;
      align-items: center;
      gap: 0;
      position: absolute;
      top: 50%;
      left: 80px;
      right: 80px;
      transform: translateY(-240px);
    }

    /* ─── MAIN COPY ─── */
    .main-copy {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .label {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .label::before {
      content: '';
      display: block;
      width: 40px;
      height: 1.5px;
      background: var(--gold);
      opacity: 0.7;
    }

    .headline-block {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .headline-pre {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 700;
      font-size: 72px;
      line-height: 1;
      color: rgba(255,255,255,0.85);
      letter-spacing: -1px;
    }

    .headline-main {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 148px;
      line-height: 0.88;
      color: var(--white);
      letter-spacing: -5px;
      text-transform: uppercase;
    }

    .headline-sub {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 700;
      font-size: 72px;
      line-height: 1;
      color: rgba(255,255,255,0.85);
      letter-spacing: -1px;
      margin-top: 4px;
    }

    /* ─── DATE BLOCK ─── */
    .date-block {
      margin-top: 44px;
      display: flex;
      align-items: flex-end;
      gap: 40px;
    }

    .date-number {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 200px;
      line-height: 0.85;
      color: var(--gold);
      letter-spacing: -8px;
    }

    .date-text {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-bottom: 16px;
    }

    .date-month {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 52px;
      line-height: 1;
      color: rgba(255,255,255,0.9);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .date-year {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 20px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 4px;
    }

    /* ─── HORIZONTAL RULE ─── */
    .h-rule {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, rgba(255,255,255,0.12), rgba(255,255,255,0));
      margin: 40px 0 32px;
    }

    /* ─── BOTTOM BAR ─── */
    .bottom-bar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .bottom-left {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .destination {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }

    .route {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 20px;
      color: rgba(255,255,255,0.85);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .route-arrow {
      color: var(--aqua);
      font-size: 18px;
    }

    .handle {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.25);
      letter-spacing: 1px;
      text-align: right;
    }

    /* ─── AQUA LINE ACCENT ─── */
    .aqua-line {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(to right, var(--aqua), rgba(6,182,212,0.1));
    }

    /* ─── CORNER BRACKET ─── */
    .corner-tl {
      position: absolute;
      top: 48px;
      right: 80px;
      width: 32px;
      height: 32px;
      border-top: 1.5px solid rgba(255,255,255,0.15);
      border-right: 1.5px solid rgba(255,255,255,0.15);
    }
    .corner-br {
      position: absolute;
      bottom: 48px;
      right: 80px;
      width: 32px;
      height: 32px;
      border-bottom: 1.5px solid rgba(255,255,255,0.15);
      border-right: 1.5px solid rgba(255,255,255,0.15);
    }
  </style>
</head>
<body>
  <div class="poster">

    <!-- BG -->
    <div class="bg"></div>
    <div class="overlay-bottom"></div>
    <div class="overlay-left"></div>
    <div class="grain"></div>
    <div class="glow"></div>

    <!-- CORNER DETAILS -->
    <div class="corner-tl"></div>
    <div class="corner-br"></div>

    <!-- AQUA BOTTOM LINE -->
    <div class="aqua-line"></div>

    <!-- CONTENT -->
    <div class="content">

      <!-- TOP -->
      <div class="top-bar">
        <div class="logo-area">
          <img class="logo-img" src="img/logo viamar.png" alt="VIAMAR" />
        </div>
        <div class="season-tag">Temporada 2025</div>
      </div>

      <!-- MAIN COPY -->
      <div class="main-copy">
        <div class="label">Primeira travessia</div>

        <div class="headline-block">
          <div class="headline-pre">a nossa</div>
          <div class="headline-main">viagem</div>
          <div class="headline-sub">começa aqui.</div>
        </div>

        <div class="date-block">
          <div class="date-number">9</div>
          <div class="date-text">
            <div class="date-month">Maio</div>
            <div class="date-year">2025</div>
          </div>
        </div>

        <div class="h-rule"></div>

        <div class="bottom-bar">
          <div class="bottom-left">
            <div class="destination">Rota</div>
            <div class="route">
              Peniche
              <span class="route-arrow">→</span>
              Ilha da Berlenga
            </div>
          </div>
          <div class="handle">@viamar.pt</div>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
